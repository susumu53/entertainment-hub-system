name: Seesaw Space Hourly AutoPost

on:
  schedule:
    - cron: '30 * * * *'  # 毎時30分に実行 (既存のブログと時間をずらす)
  workflow_dispatch:      # 手動実行用

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AutoPost script
        env:
          DMM_API_ID: ${{ secrets.DMM_API_ID }}
          DMM_AFFILIATE_ID: ${{ secrets.DMM_AFFILIATE_ID }}
          SEESAA_EMAIL: ${{ secrets.SEESAA_EMAIL }}
          SEESAA_PASSWORD: ${{ secrets.SEESAA_PASSWORD }}
          TARGET_BLOG_URL: ${{ secrets.TARGET_BLOG_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python main.py

      - name: Commit and Push Log changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_log.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update posted log [skip ci]" && git push)
